<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CougarPlanner — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --red:#c8102e; --red-h:#a50e26;
  --bg:#0f1117; --card:#1a1d27; --input:#252836; --hover:#2e3244;
  --border:#2e3244; --border-s:rgba(255,255,255,0.06);
  --t1:#e8eaed; --t2:#9ca3af; --t3:#6b7280;
  --green:#22c55e; --yellow:#eab308; --err:#ef4444;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'Space Mono',monospace;
}
html,body,#root { height:100%; }
body { background:var(--bg); color:var(--t1); font-family:var(--sans); overflow:hidden; }
button { font-family:var(--sans); cursor:pointer; border:none; }
input,select,textarea { font-family:var(--sans); }
a { text-decoration:none; color:inherit; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "layout": "sidebar",
  "avatarStyle": "initials",
  "accentColor": "#b40e29"
}/*EDITMODE-END*/;

/* ─── MICRO COMPONENTS ──────────────────────────────── */
const Avatar = ({ name, size = 64, accentColor = 'var(--red)' }) => {
  const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: 'var(--input)', border: `2px solid ${accentColor}50`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: 'var(--mono)', fontSize: size * 0.3, fontWeight: 700,
      color: accentColor, flexShrink: 0, userSelect: 'none'
    }}>{initials}</div>
  );
};

const RatingBadge = ({ val }) => {
  const col = val >= 4 ? 'var(--green)' : val >= 3 ? 'var(--yellow)' : 'var(--err)';
  const bg  = val >= 4 ? 'rgba(34,197,94,0.1)' : val >= 3 ? 'rgba(234,179,8,0.1)' : 'rgba(239,68,68,0.1)';
  return <span style={{ fontFamily:'var(--mono)', fontSize:11, fontWeight:700, padding:'2px 7px', borderRadius:3, background:bg, color:col }}>{val.toFixed(1)}</span>;
};

const Tag = ({ children }) => (
  <span style={{ fontFamily:'var(--mono)', fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--t3)', border:'1px solid var(--border)', padding:'2px 7px', borderRadius:2 }}>{children}</span>
);

const Btn = ({ children, variant = 'primary', onClick, style: s = {}, accentColor = 'var(--red)' }) => {
  const [pr, setPr] = useState(false);
  const variants = {
    primary: { background: accentColor, color: '#fff' },
    secondary: { background: 'var(--card)', color: 'var(--t1)', border: '1px solid var(--border)' },
    ghost: { background: 'transparent', color: 'var(--t2)', border: '1px solid var(--border)' },
    danger: { background: 'rgba(239,68,68,0.1)', color: 'var(--err)', border: '1px solid rgba(239,68,68,0.25)' },
  };
  return (
    <button onClick={onClick}
      onMouseDown={() => setPr(true)} onMouseUp={() => setPr(false)} onMouseLeave={() => setPr(false)}
      style={{ fontSize:13, fontWeight:600, padding:'8px 16px', borderRadius:6, cursor:'pointer',
        transition:'all 0.12s', transform: pr ? 'scale(0.97)' : 'scale(1)',
        ...variants[variant], ...s }}>
      {children}
    </button>
  );
};

const Field = ({ label, value, onChange, type = 'text', hint, readOnly, placeholder }) => (
  <div style={{ marginBottom: 18 }}>
    <label style={{ display:'block', fontSize:12, fontWeight:600, color:'var(--t2)', marginBottom:6, letterSpacing:'0.02em' }}>{label}</label>
    <input
      type={type} value={value} onChange={onChange ? e => onChange(e.target.value) : undefined}
      placeholder={placeholder} readOnly={readOnly}
      style={{
        width:'100%', background: readOnly ? 'rgba(37,40,54,0.5)' : 'var(--input)',
        border:'1px solid var(--border)', borderRadius:6, padding:'9px 13px',
        fontSize:14, color: readOnly ? 'var(--t3)' : 'var(--t1)', outline:'none',
        cursor: readOnly ? 'default' : 'text',
        transition:'border-color 0.12s, box-shadow 0.12s'
      }}
      onFocus={e => { if (!readOnly) { e.target.style.borderColor='var(--red)'; e.target.style.boxShadow='0 0 0 3px rgba(200,16,46,0.12)'; }}}
      onBlur={e => { e.target.style.borderColor='var(--border)'; e.target.style.boxShadow='none'; }}
    />
    {hint && <div style={{ fontSize:12, color:'var(--t3)', marginTop:5 }}>{hint}</div>}
  </div>
);

const SelectField = ({ label, value, onChange, options, hint }) => (
  <div style={{ marginBottom: 18 }}>
    <label style={{ display:'block', fontSize:12, fontWeight:600, color:'var(--t2)', marginBottom:6, letterSpacing:'0.02em' }}>{label}</label>
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ width:'100%', background:'var(--input)', border:'1px solid var(--border)', borderRadius:6, padding:'9px 13px', fontSize:14, color:'var(--t1)', outline:'none', cursor:'pointer' }}>
      {options.map(o => <option key={o.value || o} value={o.value || o}>{o.label || o}</option>)}
    </select>
    {hint && <div style={{ fontSize:12, color:'var(--t3)', marginTop:5 }}>{hint}</div>}
  </div>
);

const Toggle = ({ label, desc, checked, onChange, accentColor = 'var(--red)', last }) => (
  <div onClick={() => onChange(!checked)} style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:16, padding:'13px 0', borderBottom: last ? 'none' : '1px solid var(--border)', cursor:'pointer' }}>
    <div>
      <div style={{ fontSize:14, fontWeight:500, color:'var(--t1)', marginBottom:2 }}>{label}</div>
      {desc && <div style={{ fontSize:13, color:'var(--t3)' }}>{desc}</div>}
    </div>
    <div onClick={() => onChange(!checked)}
      style={{
        width:40, height:22, borderRadius:11, flexShrink:0, cursor:'pointer', marginTop:2,
        background: checked ? accentColor : 'var(--input)',
        border: `1px solid ${checked ? accentColor : 'var(--border)'}`,
        position:'relative', transition:'all 0.2s'
      }}>
      <div style={{
        position:'absolute', top:2, left: checked ? 20 : 2, width:16, height:16,
        borderRadius:'50%', background:'#fff', transition:'left 0.2s',
        boxShadow:'0 1px 3px rgba(0,0,0,0.4)'
      }}/>
    </div>
  </div>
);

const SectionHeader = ({ title, desc, action }) => (
  <div style={{ marginBottom:28, paddingBottom:20, borderBottom:'1px solid var(--border)', display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:16 }}>
    <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
      <div style={{ width:3, height:36, borderRadius:2, background:'var(--red)', flexShrink:0, marginTop:2 }} />
      <div>
        <h2 style={{ fontSize:20, fontWeight:700, color:'var(--t1)', marginBottom:4 }}>{title}</h2>
        {desc && <p style={{ fontSize:13, color:'var(--t3)' }}>{desc}</p>}
      </div>
    </div>
    {action}
  </div>
);

const FormCard = ({ children }) => (
  <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:10, padding:'24px', marginBottom:20 }}>
    {children}
  </div>
);

/* ─── DATA ──────────────────────────────────────────── */
const USER = { name: 'Alex Johnson', email: 'ajohnson@siue.edu', siueId: '800123456', major: 'Computer Science', year: 'Junior', credits: 87, gpa: 3.6 };

const SAVED_COURSES = [
  { code:'CS 425', name:'Algorithms', rating:3.8, seats:{open:12,total:20}, days:['M','W'], time:'2:00–3:15 PM' },
  { code:'CS 340', name:'Database Systems', rating:4.6, seats:{open:9,total:20}, days:['M','W'], time:'3:30–4:45 PM' },
  { code:'MATH 250', name:'Calculus III', rating:4.1, seats:{open:3,total:30}, days:['T','R'], time:'11:00 AM–12:15 PM' },
];

const MY_SCHEDULES = [
  { name:'Primary — Spring 2026', courses:4, credits:13, updated:'Apr 20', status:'active' },
  { name:'Backup Plan A', courses:4, credits:14, updated:'Apr 18', status:'draft' },
  { name:'Backup Plan B', courses:3, credits:10, updated:'Apr 15', status:'draft' },
];

/* ─── SECTION PANELS ─────────────────────────────────── */
const AccountPanel = ({ user, setUser, accentColor }) => {
  const [name, setName] = useState(user.name);
  const [saved, setSaved] = useState(false);
  return (
    <div>
      <SectionHeader title="Account" desc="Manage your personal information." />
      <FormCard>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 24px' }}>
          <Field label="Display Name" value={name} onChange={v => { setName(v); setSaved(false); }} />
          <Field label="SIUE Email" value={user.email} readOnly hint="Contact your advisor to change email." />
          <Field label="SIUE ID" value={user.siueId} readOnly hint="Your 9-digit Banner ID." />
        </div>
        <div style={{ display:'flex', gap:10, marginTop:8 }}>
          <Btn variant="primary" accentColor={accentColor} onClick={() => setSaved(true)}>
            {saved ? '✓ Saved' : 'Save Changes'}
          </Btn>
          <Btn variant="ghost" onClick={() => { setName(user.name); setSaved(false); }}>Cancel</Btn>
        </div>
      </FormCard>

      <div style={{ marginTop:8 }}>
        <div style={{ fontSize:13, fontWeight:600, color:'var(--t3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:12 }}>Danger Zone</div>
        <div style={{ border:'1px solid rgba(239,68,68,0.25)', borderRadius:10, padding:'18px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:16, background:'rgba(239,68,68,0.05)' }}>
          <div>
            <div style={{ fontSize:14, fontWeight:600, color:'var(--t1)', marginBottom:2 }}>Delete account</div>
            <div style={{ fontSize:13, color:'var(--t3)' }}>Permanently remove your account and all saved data.</div>
          </div>
          <Btn variant="danger">Delete Account</Btn>
        </div>
      </div>
    </div>
  );
};

const AcademicPanel = ({ user, accentColor }) => {
  const [major, setMajor] = useState(user.major);
  const [year, setYear] = useState(user.year);
  const [credits, setCredits] = useState(String(user.credits));
  const [saved, setSaved] = useState(false);
  return (
    <div>
      <SectionHeader title="Academic Info" desc="Used to personalize your course suggestions." />
      <FormCard>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 24px' }}>
          <SelectField label="Major" value={major} onChange={v => { setMajor(v); setSaved(false); }}
            options={['Computer Science','Mathematics','Physics','Mechanical Engineering','Electrical Engineering','Biology','Chemistry','Business Administration','Other']} />
          <SelectField label="Year" value={year} onChange={v => { setYear(v); setSaved(false); }}
            options={['Freshman','Sophomore','Junior','Senior','Graduate']} />
          <Field label="Credit Hours Completed" value={credits} onChange={v => { setCredits(v); setSaved(false); }} type="number" hint="Used to track progress toward graduation." />
          <Field label="Cumulative GPA" value={String(user.gpa)} readOnly hint="Pulled from SIUE records." />
        </div>
        <div style={{ marginBottom:16, padding:'12px 14px', background:'rgba(200,16,46,0.06)', border:'1px solid rgba(200,16,46,0.15)', borderRadius:6, display:'flex', alignItems:'center', gap:8 }}>
          <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" style={{color:'var(--t3)',flexShrink:0}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span style={{ fontSize:13, color:'var(--t3)' }}>Academic info is only used to personalize your experience — never shared.</span>
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <Btn variant="primary" accentColor={accentColor} onClick={() => setSaved(true)}>{saved ? '✓ Saved' : 'Save Changes'}</Btn>
          <Btn variant="ghost">Cancel</Btn>
        </div>
      </FormCard>
    </div>
  );
};

const SchedulesPanel = ({ accentColor }) => (
  <div>
    <SectionHeader title="My Schedules" desc="All saved schedule drafts for the current term."
      action={<Btn variant="primary" accentColor={accentColor} style={{ fontSize:12, padding:'7px 14px' }}>+ New Schedule</Btn>} />
    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
      {MY_SCHEDULES.map((s, i) => (
        <div key={s.name} style={{ background:'var(--card)', border:`1px solid ${i===0 ? accentColor+'40' : 'var(--border)'}`, borderRadius:8, padding:'16px 18px', display:'flex', alignItems:'center', gap:16 }}>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
              <span style={{ fontSize:15, fontWeight:600, color:'var(--t1)' }}>{s.name}</span>
              {s.status === 'active' && <span style={{ fontFamily:'var(--mono)', fontSize:9, letterSpacing:'0.1em', textTransform:'uppercase', color:accentColor, background:`${accentColor}15`, border:`1px solid ${accentColor}30`, padding:'2px 8px', borderRadius:2 }}>Active</span>}
            </div>
            <div style={{ display:'flex', gap:16, fontSize:13, color:'var(--t3)' }}>
              <span>{s.courses} courses</span>
              <span>{s.credits} credits</span>
              <span>Updated {s.updated}</span>
            </div>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <Btn variant="secondary" style={{ fontSize:12, padding:'6px 12px' }}>View</Btn>
            <Btn variant="ghost" style={{ fontSize:12, padding:'6px 12px' }}>Duplicate</Btn>
          </div>
        </div>
      ))}
    </div>
    <div style={{ marginTop:24, padding:'20px', border:'1px dashed var(--border)', borderRadius:8, textAlign:'center', color:'var(--t3)', fontSize:14 }}>
      You can save up to 10 schedule drafts per term.
    </div>
  </div>
);

const SavedPanel = ({ accentColor }) => (
  <div>
    <SectionHeader title="Saved Courses" desc="Courses you've bookmarked for easy reference." />
    <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
      {SAVED_COURSES.map(c => {
        const ratio = c.seats.open / c.seats.total;
        const seatCol = ratio > 0.3 ? 'var(--green)' : ratio > 0 ? 'var(--yellow)' : 'var(--err)';
        const seatBg  = ratio > 0.3 ? 'rgba(34,197,94,0.1)' : ratio > 0 ? 'rgba(234,179,8,0.1)' : 'rgba(239,68,68,0.1)';
        return (
          <div key={c.code} style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:8, padding:'14px 18px', display:'flex', alignItems:'center', gap:16 }}>
            <div style={{ flex:1 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:5 }}>
                <span style={{ fontFamily:'var(--mono)', fontSize:11, color:accentColor }}>{c.code}</span>
                <div style={{ display:'flex', gap:3 }}>
                  {['M','T','W','R','F'].map(d => (
                    <span key={d} style={{ fontSize:9, padding:'1px 5px', borderRadius:9999, background: c.days.includes(d) ? accentColor : 'var(--input)', color: c.days.includes(d) ? '#fff' : 'var(--t3)', fontWeight:600 }}>{d}</span>
                  ))}
                </div>
              </div>
              <div style={{ fontSize:14, fontWeight:600, color:'var(--t1)', marginBottom:2 }}>{c.name}</div>
              <div style={{ fontSize:12, color:'var(--t3)' }}>{c.time}</div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:6 }}>
              <RatingBadge val={c.rating} />
              <span style={{ fontFamily:'var(--mono)', fontSize:10, fontWeight:700, padding:'2px 6px', borderRadius:3, background:seatBg, color:seatCol }}>{c.seats.open}/{c.seats.total} seats</span>
            </div>
            <div style={{ display:'flex', gap:8, marginLeft:8 }}>
              <Btn variant="primary" accentColor={accentColor} style={{ fontSize:12, padding:'6px 12px' }}>Add to Schedule</Btn>
              <Btn variant="ghost" style={{ fontSize:12, padding:'6px 12px' }}>
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
              </Btn>
            </div>
          </div>
        );
      })}
    </div>
  </div>
);

const NotificationsPanel = ({ accentColor }) => {
  const [prefs, setPrefs] = useState({
    seatAlerts: true, scheduleReminders: true, newCourses: false,
    emailDigest: true, rmpUpdates: false, registrationOpen: true
  });
  const toggle = key => setPrefs(p => ({ ...p, [key]: !p[key] }));
  return (
    <div>
      <SectionHeader title="Notifications" desc="Control how and when CougarPlanner contacts you." />
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:13, fontWeight:600, color:'var(--t3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:10 }}>Seat &amp; Course Alerts</div>
        <FormCard>
          <Toggle label="Seat availability alerts" desc="Notify me when a full course gets an open seat." checked={prefs.seatAlerts} onChange={() => toggle('seatAlerts')} accentColor={accentColor} />
          <Toggle label="New course sections" desc="Alert when new sections are added for saved courses." checked={prefs.newCourses} onChange={() => toggle('newCourses')} accentColor={accentColor} />
          <Toggle label="RateMyProfessors updates" desc="Notify when a saved professor gets new reviews." checked={prefs.rmpUpdates} onChange={() => toggle('rmpUpdates')} accentColor={accentColor} last />
        </FormCard>
      </div>
      <div style={{ fontSize:13, fontWeight:600, color:'var(--t3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:10 }}>Schedule &amp; Registration</div>
      <FormCard>
        <Toggle label="Schedule reminders" desc="Reminders 7 days before add/drop deadlines." checked={prefs.scheduleReminders} onChange={() => toggle('scheduleReminders')} accentColor={accentColor} />
        <Toggle label="Registration open" desc="Alert when open enrollment begins for the next term." checked={prefs.registrationOpen} onChange={() => toggle('registrationOpen')} accentColor={accentColor} />
        <Toggle label="Weekly email digest" desc="A summary of your saved courses and seat changes." checked={prefs.emailDigest} onChange={() => toggle('emailDigest')} accentColor={accentColor} />
      </FormCard>
    </div>
  );
};

const SecurityPanel = ({ accentColor }) => {
  const [cur, setCur] = useState('');
  const [nw, setNw] = useState('');
  const [confirm, setConfirm] = useState('');
  const [saved, setSaved] = useState(false);
  const strength = nw.length === 0 ? null : nw.length < 6 ? 'weak' : nw.length < 10 ? 'fair' : 'strong';
  const strColor = { weak:'var(--err)', fair:'var(--yellow)', strong:'var(--green)' };
  return (
    <div>
      <SectionHeader title="Security" desc="Manage your password and account access." />
      <FormCard>
        <div style={{ fontSize:13, fontWeight:600, color:'var(--t2)', marginBottom:16, letterSpacing:'0.04em' }}>Change Password</div>
        <div style={{ maxWidth:440 }}>
          <Field label="Current password" value={cur} onChange={setCur} type="password" />
          <Field label="New password" value={nw} onChange={v => { setNw(v); setSaved(false); }} type="password" />
          {strength && (
            <div style={{ marginTop:-10, marginBottom:14, display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ flex:1, height:3, borderRadius:2, background:'var(--input)', overflow:'hidden' }}>
                <div style={{ height:'100%', borderRadius:2, background:strColor[strength], width: strength==='weak'?'33%':strength==='fair'?'66%':'100%', transition:'width 0.3s' }}/>
              </div>
              <span style={{ fontSize:10, color:strColor[strength], fontFamily:'var(--mono)', textTransform:'uppercase', letterSpacing:'0.08em' }}>{strength}</span>
            </div>
          )}
          <Field label="Confirm new password" value={confirm} onChange={v => { setConfirm(v); setSaved(false); }} type="password"
            hint={confirm && nw !== confirm ? '⚠ Passwords do not match' : undefined} />
          <Btn variant="primary" accentColor={accentColor} onClick={() => setSaved(true)} style={{ marginTop:4 }}>
            {saved ? '✓ Password Updated' : 'Update Password'}
          </Btn>
        </div>
      </FormCard>

      <div style={{ fontSize:13, fontWeight:600, color:'var(--t3)', letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:12 }}>Active Sessions</div>
      <FormCard>
        {[
          { browser:'Chrome on macOS', loc:'Edwardsville, IL', current:true, time:'Now' },
          { browser:'Safari on iPhone', loc:'Edwardsville, IL', current:false, time:'2 hours ago' },
        ].map((s, i) => (
          <div key={s.browser} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:16, padding: i > 0 ? '14px 0 0' : '0 0 14px', borderBottom: i === 0 ? '1px solid var(--border)' : 'none' }}>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <div style={{ width:36, height:36, borderRadius:8, background:'var(--input)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--t3)', flexShrink:0 }}>
                {s.browser.includes('iPhone')
                  ? <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
                  : <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>}
              </div>
              <div>
                <div style={{ fontSize:13, fontWeight:500, color:'var(--t1)', marginBottom:2, display:'flex', alignItems:'center', gap:8 }}>
                  {s.browser}
                  {s.current && <span style={{ fontFamily:'var(--mono)', fontSize:9, color:accentColor, background:`${accentColor}15`, padding:'1px 7px', borderRadius:2, border:`1px solid ${accentColor}30`, letterSpacing:'0.1em', textTransform:'uppercase' }}>This device</span>}
                </div>
                <div style={{ fontSize:12, color:'var(--t3)' }}>{s.loc} · {s.time}</div>
              </div>
            </div>
            {!s.current && <Btn variant="ghost" style={{ fontSize:11, padding:'5px 10px', color:'var(--err)', borderColor:'rgba(239,68,68,0.3)' }}>Revoke</Btn>}
          </div>
        ))}
      </FormCard>
    </div>
  );
};

/* ─── NAV ITEMS ─────────────────────────────────────── */
const NAV_ITEMS = [
  { id:'account',       label:'Account',       icon:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg> },
  { id:'academic',      label:'Academic Info',  icon:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> },
  { id:'schedules',     label:'My Schedules',   icon:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> },
  { id:'saved',         label:'Saved Courses',  icon:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg> },
  { id:'notifications', label:'Notifications',  icon:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg> },
  { id:'security',      label:'Security',       icon:<svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg> },
];

/* ─── SIDEBAR LAYOUT ─────────────────────────────────── */
const SidebarLayout = ({ section, setSection, user, accentColor }) => (
  <div style={{ display:'flex', height:'100%' }}>
    {/* Sidebar */}
    <div style={{ width:240, flexShrink:0, borderRight:'1px solid var(--border)', background:'#0d0f18', display:'flex', flexDirection:'column', overflowY:'auto' }}>
      {/* Profile hero */}
      <div style={{ padding:'28px 20px 24px', borderBottom:'1px solid var(--border)', position:'relative', overflow:'hidden' }}>
        {/* Glow */}
        <div style={{ position:'absolute', top:-40, left:-40, width:180, height:180, background:`radial-gradient(circle, ${accentColor}18 0%, transparent 65%)`, pointerEvents:'none' }} />
        <div style={{ position:'relative' }}>
          {/* Avatar with ring */}
          <div style={{ position:'relative', width:72, height:72, marginBottom:14 }}>
            <div style={{ position:'absolute', inset:-2, borderRadius:'50%', background:`${accentColor}40`, border:`1px solid ${accentColor}60` }} />
            <div style={{ position:'relative', width:72, height:72, borderRadius:'50%', background:'var(--input)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--mono)', fontSize:22, fontWeight:700, color:accentColor, border:`2px solid ${accentColor}50` }}>
              {user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
            </div>
          </div>
          <div style={{ fontSize:15, fontWeight:700, color:'var(--t1)', marginBottom:2 }}>{user.name}</div>
          <div style={{ fontSize:12, color:'var(--t3)', marginBottom:14 }}>{user.email}</div>
          {/* Stat pills */}
          <div style={{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:16 }}>
            <span style={{ fontFamily:'var(--mono)', fontSize:9, letterSpacing:'0.08em', textTransform:'uppercase', color:accentColor, background:`${accentColor}15`, border:`1px solid ${accentColor}30`, padding:'3px 8px', borderRadius:2 }}>{user.year}</span>
            <span style={{ fontFamily:'var(--mono)', fontSize:9, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--t3)', background:'var(--input)', border:'1px solid var(--border)', padding:'3px 8px', borderRadius:2 }}>{user.major.split(' ')[0]}</span>
          </div>
          {/* Credits progress */}
          <div>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, marginBottom:5 }}>
              <span style={{ color:'var(--t3)' }}>Credits toward graduation</span>
              <span style={{ fontFamily:'var(--mono)', fontSize:10, color:accentColor, fontWeight:700 }}>{user.credits}/120</span>
            </div>
            <div style={{ height:4, background:'var(--input)', borderRadius:2, overflow:'hidden' }}>
              <div style={{ height:'100%', width:`${(user.credits/120)*100}%`, background:`linear-gradient(90deg, ${accentColor}80, ${accentColor})`, borderRadius:2, transition:'width 0.6s ease' }} />
            </div>
          </div>
        </div>
      </div>
      {/* GPA badge */}
      <div style={{ margin:'12px 16px', padding:'12px 14px', background:'var(--card)', border:'1px solid var(--border)', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontSize:12, color:'var(--t3)' }}>Cumulative GPA</span>
        <span style={{ fontFamily:'var(--mono)', fontSize:16, fontWeight:700, color:'var(--green)' }}>{user.gpa.toFixed(2)}</span>
      </div>
      {/* Nav */}
      <nav style={{ padding:'8px 10px', flex:1 }}>
        {NAV_ITEMS.map(item => (
          <button key={item.id} onClick={() => setSection(item.id)}
            style={{
              width:'100%', display:'flex', alignItems:'center', gap:10,
              padding:'9px 12px', borderRadius:6, fontSize:13, fontWeight:500,
              border:'none', cursor:'pointer', textAlign:'left', marginBottom:1,
              background: section === item.id ? `${accentColor}15` : 'transparent',
              color: section === item.id ? 'var(--t1)' : 'var(--t2)',
              borderLeft: `2px solid ${section === item.id ? accentColor : 'transparent'}`,
              transition:'all 0.12s'
            }}>
            <span style={{ color: section === item.id ? accentColor : 'var(--t3)', flexShrink:0 }}>{item.icon}</span>
            {item.label}
          </button>
        ))}
      </nav>
    </div>
    {/* Content */}
    <div style={{ flex:1, overflowY:'auto', padding:'36px 48px', background:'var(--bg)' }}>
      <PanelContent section={section} user={user} accentColor={accentColor} />
    </div>
  </div>
);

/* ─── TAB LAYOUT ─────────────────────────────────────── */
const TabLayout = ({ section, setSection, user, accentColor }) => (
  <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
    {/* Profile header */}
    <div style={{ padding:'24px 32px 0', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:20 }}>
        <Avatar name={user.name} size={56} accentColor={accentColor} />
        <div>
          <div style={{ fontSize:18, fontWeight:700, color:'var(--t1)' }}>{user.name}</div>
          <div style={{ fontSize:13, color:'var(--t3)', marginTop:2 }}>{user.email} · {user.major} · {user.year}</div>
        </div>
      </div>
      {/* Tabs */}
      <div style={{ display:'flex', gap:0 }}>
        {NAV_ITEMS.map(item => (
          <button key={item.id} onClick={() => setSection(item.id)}
            style={{
              padding:'10px 16px', fontSize:13, fontWeight:500, border:'none',
              background:'transparent', cursor:'pointer', color: section===item.id ? 'var(--t1)' : 'var(--t3)',
              borderBottom: `2px solid ${section===item.id ? accentColor : 'transparent'}`,
              transition:'all 0.12s', display:'flex', alignItems:'center', gap:7
            }}>
            <span style={{ color: section===item.id ? accentColor : 'var(--t3)' }}>{item.icon}</span>
            {item.label}
          </button>
        ))}
      </div>
    </div>
    {/* Content */}
    <div style={{ flex:1, overflowY:'auto', padding:'32px 40px' }}>
      <PanelContent section={section} user={user} accentColor={accentColor} />
    </div>
  </div>
);

/* ─── PANEL ROUTER ───────────────────────────────────── */
const PanelContent = ({ section, user, accentColor }) => {
  if (section === 'account')       return <AccountPanel user={user} accentColor={accentColor} />;
  if (section === 'academic')      return <AcademicPanel user={user} accentColor={accentColor} />;
  if (section === 'schedules')     return <SchedulesPanel accentColor={accentColor} />;
  if (section === 'saved')         return <SavedPanel accentColor={accentColor} />;
  if (section === 'notifications') return <NotificationsPanel accentColor={accentColor} />;
  if (section === 'security')      return <SecurityPanel accentColor={accentColor} />;
  return null;
};

/* ─── NAVBAR ─────────────────────────────────────────── */
const Navbar = ({ user, section, setSection, accentColor }) => (
  <nav style={{ background:'var(--bg)', borderBottom:'1px solid var(--border)', padding:'0 24px', height:56, display:'flex', alignItems:'center', flexShrink:0 }}>
    <span style={{ fontFamily:'var(--mono)', fontSize:16, fontWeight:700, color:'var(--t1)', marginRight:32 }}>
      Cougar<span style={{ color:accentColor }}>Planner</span>
    </span>
    <div style={{ display:'flex', gap:2 }}>
      {[['courses','Courses'],['professors','Professors'],['schedule','Schedule'],['my-schedules','My Schedules']].map(([p,l]) => (
        <button key={p} style={{ fontSize:14, fontWeight:500, color:'var(--t2)', padding:'6px 12px', borderRadius:4, background:'transparent', border:'none', cursor:'pointer' }}>{l}</button>
      ))}
    </div>
    <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:10 }}>
      <div style={{ width:32, height:32, borderRadius:'50%', background:`${accentColor}18`, border:`1px solid ${accentColor}40`, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--mono)', fontSize:11, color:accentColor, fontWeight:700, cursor:'pointer' }}>
        {user.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
      </div>
    </div>
  </nav>
);

/* ─── ROOT ───────────────────────────────────────────── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const { layout, accentColor } = tweaks;
  const [section, setSection] = useState('account');
  const user = USER;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <Navbar user={user} section={section} setSection={setSection} accentColor={accentColor} />
      <div style={{ flex:1, overflow:'hidden' }}>
        {layout === 'sidebar'
          ? <SidebarLayout section={section} setSection={setSection} user={user} accentColor={accentColor} />
          : <TabLayout     section={section} setSection={setSection} user={user} accentColor={accentColor} />}
      </div>
      <TweaksPanel>
        <TweakSection label="Layout">
          <TweakRadio label="Style" value={layout}
            options={[{label:'Sidebar',value:'sidebar'},{label:'Tab bar',value:'tabs'}]}
            onChange={v => setTweak('layout', v)} />
        </TweakSection>
        <TweakSection label="Brand">
          <TweakColor label="Accent color" value={accentColor}
            onChange={v => setTweak('accentColor', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
