<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CougarPlanner — SIUE Course Planning, Simplified</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #0A0A0A; color: #e8eaed; overflow-x: hidden; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0A0A0A; }
::-webkit-scrollbar-thumb { background: #2e3244; border-radius: 3px; }

/* Grid texture */
.grid-bg {
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes glowPulse {
  0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
  50%     { opacity: 0.8; transform: translate(-50%,-50%) scale(1.08); }
}
@keyframes scrollIn {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: translateY(0); }
}

.anim-1 { animation: fadeUp 0.7s ease 0.1s both; }
.anim-2 { animation: fadeUp 0.7s ease 0.25s both; }
.anim-3 { animation: fadeUp 0.7s ease 0.4s both; }
.anim-4 { animation: fadeUp 0.7s ease 0.55s both; }
.anim-5 { animation: fadeUp 0.7s ease 0.7s both; }

.reveal { opacity: 0; }
.reveal.visible { animation: scrollIn 0.6s ease forwards; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "editorial",
  "heroSize": "medium",
  "showAppPreview": true,
  "accentColor": "#c8102e"
}/*EDITMODE-END*/;

/* ── SHARED ─────────────────────────────────────────── */
const Red = ({ children, color }) => <span style={{ color: color || '#c8102e' }}>{children}</span>;

const Btn = ({ children, variant = 'primary', href, onClick, accentColor = '#c8102e', style: s = {} }) => {
  const [hov, setHov] = useState(false);
  const base = {
    fontFamily: "'DM Sans', sans-serif", fontWeight: 600, fontSize: 15,
    padding: '12px 24px', borderRadius: 6, cursor: 'pointer',
    transition: 'all 0.15s ease', display: 'inline-flex', alignItems: 'center',
    gap: 8, textDecoration: 'none', border: 'none', ...s
  };
  const styles = {
    primary: {
      background: hov ? shiftColor(accentColor, -15) : accentColor,
      color: '#fff',
      boxShadow: hov ? `0 0 24px ${accentColor}55` : `0 0 0px ${accentColor}00`
    },
    secondary: {
      background: 'transparent', color: '#e8eaed',
      border: '1px solid rgba(255,255,255,0.15)',
      backdropFilter: 'blur(8px)',
      backgroundColor: hov ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.03)'
    }
  };
  const Tag = href ? 'a' : 'button';
  return (
    <Tag href={href} onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ ...base, ...styles[variant] }}>
      {children}
    </Tag>
  );
};

function shiftColor(hex, amount) {
  const num = parseInt(hex.slice(1), 16);
  const r = Math.max(0, Math.min(255, (num >> 16) + amount));
  const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amount));
  const b = Math.max(0, Math.min(255, (num & 0xff) + amount));
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}

/* ── REVEAL HOOK ─────────────────────────────────────── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
    }, { threshold: 0.12 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

/* ── NAVBAR ─────────────────────────────────────────── */
const Navbar = ({ accentColor }) => {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      padding: '0 40px', height: 60,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      background: scrolled ? 'rgba(10,10,10,0.92)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(255,255,255,0.06)' : '1px solid transparent',
      transition: 'all 0.25s ease'
    }}>
      <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 16, fontWeight: 700, color: '#e8eaed' }}>
        Cougar<Red color={accentColor}>Planner</Red>
      </span>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        <a href="#" style={{ fontSize: 14, color: '#9ca3af', textDecoration: 'none', padding: '6px 12px' }}>Sign In</a>
        <Btn variant="primary" accentColor={accentColor} style={{ fontSize: 14, padding: '8px 18px' }}>Get Started</Btn>
      </div>
    </nav>
  );
};

/* ── APP PREVIEW MOCKUP ─────────────────────────────── */
const AppPreview = ({ accentColor }) => (

    background: '#1a1d27', border: '1px solid #2e3244',
    borderRadius: 10, overflow: 'hidden',
    boxShadow: `0 40px 80px rgba(0,0,0,0.6), 0 0 60px ${accentColor}18`
  }}>
    {/* Window chrome */}

      <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#eab308', display: 'inline-block' }}></span>
      <span style={{ width: 12, height: 12, borderRadius: '50%', background: '#22c55e', display: 'inline-block' }}></span>
      <div style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>
        <div style={{ background: '#1a1d27', borderRadius: 4, padding: '4px 16px', fontSize: 12, color: '#6b7280', fontFamily: "'Space Mono', monospace" }}>cougarplanner.com</div>

    </div>

    <div style={{ background: '#0f1117', borderBottom: '1px solid #2e3244', padding: '0 20px', height: 48, display: 'flex', alignItems: 'center', gap: 20 }}>
      <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 13, fontWeight: 700, color: '#e8eaed' }}>Cougar<span style={{ color: accentColor }}>Planner</span></span>
      {['Courses', 'Professors', 'Schedule'].map(l => (

    </div>
    {/* Content */}
    <div style={{ padding: 20, display: 'flex', gap: 12, height: 340 }}>

      <div style={{ width: 180, flexShrink: 0 }}>
        <div style={{ fontSize: 11, fontFamily: "'Space Mono', monospace", color: '#6b7280', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 12 }}>Filters</div>
        {[['Subject', 'Computer Science'], ['Term', 'Spring 2026'], ['Credits', '3 Hours'], ['Delivery', 'In Person']].map(([l, v]) => (
          <div key={l} style={{ marginBottom: 10 }}>

        <div style={{ background: '#252836', border: '1px solid #2e3244', borderRadius: 6, padding: '0 12px', height: 36, display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
          <svg width="14" height="14" fill="none" stroke="#6b7280" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <span style={{ fontSize: 13, color: '#6b7280' }}>Search courses…</span>
        </div>
        {[
          { code: 'CS 201', name: 'Intro to Programming', rating: 4.6, seats: '22/30', days: ['M','W','F'], green: true },
          { code: 'CS 315', name: 'Data Structures', rating: 3.2, seats: '5/25', days: ['T','R'], green: false },
          { code: 'MATH 150', name: 'Calculus I', rating: 4.1, seats: '0/35', days: ['M','W','F'], green: true },
          { code: 'CS 425', name: 'Algorithms', rating: 3.8, seats: '12/20', days: ['M','W'], green: true },
        ].map((c, i) => (
          <div key={c.code} style={{
            background: i === 0 ? '#2e3244' : '#1a1d27', border: `1px solid ${i === 0 ? accentColor + '40' : '#2e3244'}`,
            borderRadius: 6, padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10
          }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
                <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: accentColor }}>{c.code}</span>
                <div style={{ display: 'flex', gap: 3 }}>
                  {['M','T','W','R','F'].map(d => (
                    <span key={d} style={{ fontSize: 9, padding: '1px 5px', borderRadius: 9999, background: c.days.includes(d) ? accentColor : '#252836', color: c.days.includes(d) ? '#fff' : '#6b7280', fontWeight: 600 }}>{d}</span>
                  ))}
                </div>
              </div>
              <div style={{ fontSize: 12, fontWeight: 600, color: '#e8eaed' }}>{c.name}</div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4 }}>
              <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, fontWeight: 700, padding: '2px 6px', borderRadius: 3, background: c.rating >= 4 ? 'rgba(34,197,94,0.12)' : 'rgba(234,179,8,0.12)', color: c.rating >= 4 ? '#22c55e' : '#eab308' }}>{c.rating}</span>
              <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, color: '#6b7280' }}>{c.seats}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  </div>
);

/* ── FEATURE CARD ────────────────────────────────────── */
const FeatureCard = ({ icon, title, desc, accentColor, delay = 0 }) => {
  const [hov, setHov] = useState(false);
  return (
    <div className="reveal" onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        background: hov ? '#1a1d27' : 'rgba(26,29,39,0.6)',
        border: `1px solid ${hov ? accentColor + '40' : '#2e3244'}`,
        borderRadius: 10, padding: '28px 24px',
        transition: 'all 0.2s ease',
        animationDelay: `${delay}s`
      }}>
      <div style={{ width: 44, height: 44, borderRadius: 8, background: `${accentColor}18`, border: `1px solid ${accentColor}30`, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 18, color: accentColor }}>

      <div style={{ fontSize: 14, color: '#9ca3af', lineHeight: 1.65 }}>{desc}</div>
    </div>
  );
};

/* ── STEP ────────────────────────────────────────────── */
const Step = ({ n, title, desc, accentColor }) => (
  <div className="reveal" style={{ display: 'flex', gap: 24, alignItems: 'flex-start' }}>
    <div style={{ width: 48, height: 48, borderRadius: '50%', background: `${accentColor}15`, border: `1px solid ${accentColor}40`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontFamily: "'Space Mono', monospace", fontSize: 18, fontWeight: 700, color: accentColor }}>{n}</div>
    <div style={{ paddingTop: 8 }}>

);

/* ── STAT ─────────────────────────────────────────────── */

    <div style={{ fontFamily: "'Space Mono', monospace", fontSize: 36, fontWeight: 700, color: accentColor, lineHeight: 1.1, marginBottom: 6 }}>{val}</div>

const IconCal    = () => <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
const IconShield = () => <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
const IconArrow  = () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>;

/* ── VARIANT: EDITORIAL ──────────────────────────────── */

          <Btn variant="primary" accentColor={accentColor}>
            Get Started — Free <IconArrow />
          </Btn>
          <Btn variant="secondary" accentColor={accentColor}>Browse Courses</Btn>
        </div>

        <div className="anim-5" style={{ marginTop: 32, display: 'flex', gap: 28, justifyContent: 'center', flexWrap: 'wrap' }}>

      {showAppPreview && (

/* ── VARIANT: BOLD SPLIT ─────────────────────────────── */

      <div className="anim-3" style={{ width: '100%' }}>
        <AppPreview accentColor={accentColor} />
      </div>
    </div>
  </section>
);

/* ── VARIANT: MINIMAL ────────────────────────────────── */
const MinimalHero = ({ accentColor }) => (
  <section style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '120px 40px 80px', textAlign: 'center' }}>
    <div className="anim-1" style={{ width: 1, height: 80, background: `linear-gradient(to bottom, transparent, ${accentColor})`, margin: '0 auto 40px' }} />
    <div className="anim-1" style={{ fontFamily: "'Space Mono', monospace", fontSize: 10, letterSpacing: '0.25em', textTransform: 'uppercase', color: '#6b7280', marginBottom: 32 }}>
      Southern Illinois University Edwardsville
    </div>
    <h1 className="anim-2" style={{ fontFamily: "'Space Mono', monospace", fontSize: 'clamp(3.5rem,8vw,7rem)', fontWeight: 700, lineHeight: 0.95, letterSpacing: '-0.04em', color: '#F5F3EF', marginBottom: 12 }}>

/* ── ROOT APP ────────────────────────────────────────── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const { variant, heroSize, showAppPreview, accentColor } = tweaks;
  useReveal();

  return (
    <>
      <Navbar accentColor={accentColor} />

      {variant === 'editorial' && <EditorialHero accentColor={accentColor} heroSize={heroSize} showAppPreview={showAppPreview} />}
      {variant === 'split'     && <BoldSplitHero accentColor={accentColor} showAppPreview={showAppPreview} />}
      {variant === 'minimal'   && <MinimalHero   accentColor={accentColor} />}

      <FeaturesSection accentColor={accentColor} />
      <HowItWorks accentColor={accentColor} />
      <StatsStrip accentColor={accentColor} />
      <CTASection accentColor={accentColor} />
      <Footer accentColor={accentColor} />

      <TweaksPanel>
        <TweakSection label="Hero Layout">
          <TweakRadio label="Variant" value={variant}
            options={[{label:'Editorial',value:'editorial'},{label:'Split',value:'split'},{label:'Minimal',value:'minimal'}]}
            onChange={v => setTweak('variant', v)} />
          <TweakRadio label="Headline size" value={heroSize}
            options={[{label:'Large',value:'large'},{label:'Medium',value:'medium'}]}
            onChange={v => setTweak('heroSize', v)} />
          <TweakToggle label="Show app preview in hero" value={showAppPreview}
            onChange={v => setTweak('showAppPreview', v)} />
        </TweakSection>
        <TweakSection label="Brand">
          <TweakColor label="Accent color" value={accentColor}
            onChange={v => setTweak('accentColor', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
